<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">


<fontconfig>
	
	
	<match>
		 <test name="lang" compare="contains">
			<string>en</string>
		 </test>
		 <edit name="family" mode="prepend">
			<string>Source Code Pro</string>
		</edit>
	</match>



	<match>
		 <test name="lang" compare="contains">
			<string>zh</string>
		 </test>
		 <test name="family">
			<string>sans-serif</string>
		 </test>
		 <edit name="family" mode="prepend">
			<string>Source Han Sans CN</string>
		</edit>
	</match>
</fontconfig>

